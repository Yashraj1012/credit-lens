<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CreditLens - A high-performance credit risk assessment and default probability dashboard powered by scikit-learn models and FastAPI." />
    <title>CreditLens – Credit Risk Assessment Dashboard</title>
    <script>
      (function() {
        const savedTheme = localStorage.getItem('creditlens-theme');
        const theme = savedTheme || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
